name: 官公庁オークション利益チェック

on:
  schedule:
    - cron: '0 */2 * * *'  # 2時間ごとに実行（UTC）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # state.jsonをコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザインストール
        run: playwright install chromium --with-deps

      - name: 利益チェック実行
        env:
          KANKOCHO_EMAIL: ${{ secrets.KANKOCHO_EMAIL }}
          KANKOCHO_PASSWORD: ${{ secrets.KANKOCHO_PASSWORD }}
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_OWNER_ROOM_ID: ${{ secrets.CHATWORK_OWNER_ROOM_ID }}
        run: python main.py

      - name: 状態ファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kankocho_state.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push

      - name: 結果ファイルをアップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kankocho-result-${{ github.run_number }}
          path: |
            *.xlsx
            *.png
          retention-days: 30
